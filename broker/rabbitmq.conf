management.tcp.port = 15672
management.tcp.ip = 0.0.0.0

# Disable the deprecated management metrics collector. RabbitMQ recommends
# Prometheus-style metrics instead of this legacy management plugin collector.
management_agent.disable_metrics_collector = true

# Make the deprecated feature policy explicit for current RabbitMQ versions.
deprecated_features.permit.management_metrics_collection = false
